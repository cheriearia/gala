<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Gala</title>
        <link rel="stylesheet" href="upload.css">
    </head>

    <body>
        <div class="frame">

            <header class="topbar">
                <div class="logo">
                    <div class="glyph">⚜</div>
                    Gala
                </div>
                <div class="spacer"></div>
                <div class="user-icon">AA</div>
            </header>

            <div class="main">

                <nav class="navbar">
                    <div class="nav-selection">Navigate</div>
                    <a href="" class="nav-item"><i class="ti books"></i>Library</a>
                    <a href="" class="nav-item"><i class="ti playlists"></i>Playlists</a>
                    <a href="" class="nav-item active"><i class="ti uploads"></i>Upload</a>
                    <div class="divider"></div>
                    <a href="" class="nav-item"><i class="ti clock"></i>Recent</a>
                    <a href="" class="nav-item"><i class="ti heart"></i>Favorites</a>
                    <a href="" class="nav-item"><i class="ti report"></i>Report</a>
                </nav>

                <div class="content" id="main-content">
                <div class="section-header">
                    <span class="section-title">Upload to Library</span>
                    <span class="section-sub">Fields marked * are required</span>
                </div>

                <form class="form-content" action="" method="post">

                    <!--1 - Audio File-->
                    <fieldset style="border: none; padding: 0;">
                        <legend class="form-section">I - Audio File</legend>
                        <label class="drop-zone" for="audioFile" role="button">
                            <div class="drop-icon">✦</div>
                            <div class="drop-title">Drop files here</div>
                            <div class="drop-sub">or click to open the file picker</div>
                            <div class="drop-row" id="drop-format" role="list">
                                <span class="drop-item" role="listitem">MP3</span>
                                <span class="drop-item" role="listitem">FLAC</span>
                                <span class="drop-item" role="listitem">WAV</span>
                                <span class="drop-item" role="listitem">AAC</span>
                                <span class="drop-item" role="listitem">OGG</span>
                            </div>
                        </label>
                        <input type="file" id="audioFile" name="audioFile"
                            accept=".mp3, .flac, .wav, .aac, .ogg, audio/*"
                            style="position: absolute; width: 1px; height: 1px; opacity: 0; overflow: hidden;">
                    </fieldset>

                    <!--2 - Track Details-->
                    <fieldset style="border: none; padding: 0;">
                        <legend class="form-section">II - Track Details</legend>
                        <div class="form-grid" style="margin-bottom: 10px;">
                            <div class="field-group">
                                <label class="field-label" for="trackTitle">Title<span class="req">*</span></label>
                                <input class="field-input" type="text" id="trackTitle" name="title" placeholder="House That Always Rains" maxlength="254" required>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="trackArtist">Artist<span class="req">*</span></label>
                                <input class="field-input" type="text" id="trackArtist" name="artist" placeholder="Conan Gray" maxlength="254" required>          
                            </div>
                        </div>

                        <div class="form-grid" style="margin-bottom: 10px;">
                            <div class="field-group">
                                <label class="field-label" for="trackAlbum">Album</label>
                                <input class="field-input" type="text" id="trackAlbum" name="album" placeholder="Wishbone Deluxe" maxlength="254">
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="trackYear">Release Year</label>
                                <input class="field-input" type="number" id="trackYear" name="year" placeholder="2026" min="1000" max="2099">
                            </div>
                        </div>

                        <div class="form-grid" style="margin-bottom: 10px;">
                            <div class="field-group">
                                <label class="field-label" for="trackGenre">Genre<span class="req">*</span></label>
                                <select class="field-input" id="trackGenre" name="genre" required>
                                    <option value="" disabled selected>Select a genre...</option>
                                    <option value="pop">Pop</option>
                                    <option value="alternative">Alternative</option>
                                    <option value="country">Country</option>
                                    <option value="folk">Folk</option>
                                    <option value="acoustic">Acoustic</option>
                                    <option value="rock">Rock</option>
                                    <option value="rap">Rap</option>
                                    <option value="r&b">R&B</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                            <div class="field-group">
                                <label class="field-label" for="trackDate">Date Added</label>
                                <input class="field-input" type="date" id="trackDate" name="dateadded">
                            </div>
                        </div>
                    </fieldset>
                </form>
            </div>
            </div>
        </div>
    </body>
</html>
