<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Gala</title>
        <link rel="stylesheet" href="upload.css">
    </head>

    <body>
        <div class="frame">

            <header class="topbar">
                <div class="logo">
                    <div class="glyph">⚜</div>
                    Gala
                </div>
                <div class="spacer"></div>
                <div class="user-icon">AA</div>
            </header>

            <div class="main">

                <nav class="navbar">
                    <div class="nav-selection">Navigate</div>
                    <a href="" class="nav-item"><i class="ti books"></i>Library</a>
                    <a href="" class="nav-item"><i class="ti playlists"></i>Playlists</a>
                    <a href="upload.html" class="nav-item"><i class="ti uploads"></i>Upload</a>
                    <div class="divider"></div>
                    <a href="" class="nav-item"><i class="ti clock"></i>Recent</a>
                    <a href="" class="nav-item"><i class="ti heart"></i>Favorites</a>
                    <a href="report.html" class="nav-item active"><i class="ti report"></i>Report</a>
                </nav>

                <div class="content" id="main-content">
                <div class="section-header">
                    <span class="section-title">Library Report</span>
                    <span class="section-sub">May 2026 Analytics</span>
                </div>

                <div class="track-table">
                    <div class="track-table-head">
                        <span class="track-table-title">Recently Added Tracks</span>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="track-table">
                            <thead>
                                <tr>
                                    <th>#</th>
                                    <th>Title</th>
                                    <th>Artist</th>
                                    <th>Album</th>
                                    <th>Release Year</th>
                                    <th>Genre</th>
                                    <th>Date Added</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1</td>
                                    <td>All Them Horses</td>
                                    <td>Noah Kahan</td>
                                    <td>The Great Divide</td>
                                    <td>2026</td>
                                    <td>Alternative</td>
                                    <td>04/25/26</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
